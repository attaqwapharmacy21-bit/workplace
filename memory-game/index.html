<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Memory Card Game</h1>
      <section class="controls" aria-label="Game controls">
        <div class="difficulty">
          <span>Difficulty:</span>
          <button class="btn difficulty-btn" data-difficulty="easy">Easy</button>
          <button class="btn difficulty-btn" data-difficulty="medium">Medium</button>
          <button class="btn difficulty-btn" data-difficulty="hard">Hard</button>
        </div>
        <div class="stats" aria-label="Game stats">
          <div class="stat">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Moves</span>
            <span id="moves" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Time</span>
            <span id="timer" class="stat-value">00:00</span>
          </div>
          <button id="restartBtn" class="btn restart-btn">Restart Game</button>
        </div>
      </section>
    </header>

    <section class="game-area">
      <div class="board" id="board" aria-label="Memory card board"></div>
    </section>

    <div class="modal" id="winModal" aria-hidden="true">
      <div class="modal-content">
        <h2>You Win!</h2>
        <p class="modal-text" id="finalStats"></p>
        <button class="btn" id="playAgainBtn">Play Again</button>
      </div>
    </div>

    <footer class="footer">
      <p>Flip cards, match pairs, and win!</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
